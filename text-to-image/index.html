<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>A4 Generator - @安静而苒</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { 
            display: flex; flex-direction: column; align-items: center; 
            background: #e9e9e9; padding: 20px; font-family: sans-serif; 
            margin: 0; min-height: 100vh;
        }

        /* Editor Area - No max-height so html2canvas sees everything */
        .textInp {
            width: 450px; 
            padding: 25px; 
            background: FloralWhite;
            outline: none; 
            font-size: 16px; 
            line-height: 1.8; 
            word-wrap: break-word; 
            box-sizing: border-box; 
            border: 1px solid #ccc;
            /* Height is determined by content */
        }

        .controls {
            position: sticky;
            top: 0;
            background: #f0f0f0;
            padding: 15px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 1000;
            border-bottom: 1px solid #ccc;
        }

        .button {
            background: skyblue; border: 1px solid blue; padding: 10px 20px;
            border-radius: 10px; cursor: pointer; font-weight: bold;
            margin: 5px;
        }

        /* Horizontal Scroll for Output */
        #genImg { 
            margin-top: 20px; 
            display: flex; 
            flex-direction: row; 
            gap: 20px; 
            width: 98vw; 
            overflow-x: auto; 
            padding: 20px 0;
        }

        .page-img { 
            height: 75vh; /* Large preview height */
            width: auto; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); 
            background: white;
            flex-shrink: 0; /* Prevents images from squishing */
            cursor: pointer;
        }

        .page-img:hover {
            outline: 2px solid skyblue;
            outline-offset: 2px;
        }

        #imageLightbox {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 2000;
            background: rgba(0, 0, 0, 0.85);
            overflow: auto;
            padding: 24px;
            box-sizing: border-box;
            cursor: zoom-out;
        }

        #imageLightbox.is-open {
            display: block;
        }

        .lightbox-content {
            max-width: min(800px, 92vw);
            margin: 0 auto;
            cursor: default;
        }

        #lightboxImage {
            display: block;
            width: 100%;
            height: auto;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            background: white;
        }

        #status { color: #333; font-size: 14px; margin: 5px 0; font-weight: bold;}
    </style>
</head>
<body>

    <div class="controls">
        <div>
            <button class="button" onclick="startProcess()">生成图片并加水印</button>
            <button class="button" style="background: lightsalmon;" onclick="combineAllImages()">合并并分割为4部分</button>
            <button class="button" style="background: lightgreen;" onclick="downloadAll()">下载全部</button>
        </div>
        <div id="status">准备就绪</div>
    </div>

    <div id="textInp" class="textInp" contenteditable="true">
        在此处输入文字... 编辑器高度会随文字增加，确保所有内容都能被抓取。
    </div>

    <div id="genImg"></div>

    <div id="imageLightbox" aria-hidden="true">
        <div class="lightbox-content">
            <img id="lightboxImage" src="" alt="">
        </div>
    </div>

    <script>
        let generatedImages = [];
        let imageDownloadNames = [];

        const createPageImage = (dataUrl, title) => {
            const img = document.createElement('img');
            img.src = dataUrl;
            img.className = "page-img";
            img.title = title;
            img.alt = title;
            img.tabIndex = 0;
            img.setAttribute('role', 'button');
            img.setAttribute('aria-label', `打开 ${title}`);

            const handleOpen = () => openImage(dataUrl, title);

            img.addEventListener('click', handleOpen);
            img.addEventListener('keydown', (event) => {
                if (event.key === 'Enter' || event.key === ' ') {
                    event.preventDefault();
                    handleOpen();
                }
            });

            return img;
        };

        const openImage = (dataUrl, title) => {
            const lightbox = document.getElementById('imageLightbox');
            const lightboxImage = document.getElementById('lightboxImage');

            lightboxImage.src = dataUrl;
            lightboxImage.alt = title;
            lightbox.scrollTop = 0;
            lightbox.classList.add('is-open');
            lightbox.setAttribute('aria-hidden', 'false');
        };

        const closeImage = () => {
            const lightbox = document.getElementById('imageLightbox');
            const lightboxImage = document.getElementById('lightboxImage');

            lightbox.classList.remove('is-open');
            lightbox.setAttribute('aria-hidden', 'true');
            lightboxImage.src = '';
        };

        document.getElementById('imageLightbox').addEventListener('click', (event) => {
            if (event.target === event.currentTarget) closeImage();
        });
        document.addEventListener('keydown', (event) => {
            if (event.key === 'Escape') closeImage();
        });

        async function startProcess() {
            const element = document.getElementById("textInp");
            const container = document.getElementById("genImg");
            const status = document.getElementById("status");

            container.innerHTML = "";
            generatedImages = [];
            imageDownloadNames = [];
            
            const width = element.offsetWidth;
            const pageHeight = Math.floor(width * 1.414); 
            // Measure actual total height of the expanded editor
            const totalHeight = element.scrollHeight; 
            const totalPages = Math.ceil(totalHeight / pageHeight);

            try {
                for (let i = 0; i < totalPages; i++) {
                    status.innerText = `正在合成: 第 ${i + 1} / ${totalPages} 页...`;

                    // 1. Capture content slice
                    const rawCanvas = await html2canvas(element, {
                        scale: 2, 
                        y: i * pageHeight,
                        height: Math.min(pageHeight, totalHeight - (i * pageHeight)),
                        windowHeight: totalHeight,
                        backgroundColor: "FloralWhite",
                        useCORS: true,
                        logging: false
                    });

                    // 2. The "Flattening" Canvas - Manual Watermark Injection
                    const finalCanvas = document.createElement('canvas');
                    finalCanvas.width = rawCanvas.width;
                    finalCanvas.height = rawCanvas.height;
                    const ctx = finalCanvas.getContext('2d');

                    // Draw the captured content
                    ctx.drawImage(rawCanvas, 0, 0);

                    // Force the watermark on top of the pixels
                    drawWatermark(ctx, finalCanvas.width, finalCanvas.height);

                    // 3. Convert to high-quality PNG
                    const dataUrl = finalCanvas.toDataURL("image/png", 1.0);
                    generatedImages.push(dataUrl);
                    imageDownloadNames.push(`Page_${i + 1}`);

                    container.appendChild(createPageImage(dataUrl, `第 ${i + 1} 页`));
                }
                status.innerText = "✨ 生成成功！右划查看图片。";
            } catch (err) {
                console.error(err);
                status.innerText = "❌ 出错了: " + err.message;
            }
        }

        function drawWatermark(ctx, w, h) {
            const text = "@安静而苒";
            ctx.font = "bold 60px sans-serif";
            ctx.fillStyle = "rgba(0, 0, 0, 0.2)"; 
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";

            const stepX = 400; 
            const stepY = 350;

            for (let x = -stepX; x < w + stepX; x += stepX) {
                for (let y = -stepY; y < h + stepY; y += stepY) {
                    ctx.save();
                    ctx.translate(x, y);
                    ctx.rotate(-35 * Math.PI / 180);
                    ctx.fillText(text, 0, 0);
                    ctx.restore();
                }
            }
        }

        async function combineAllImages() {
            if (generatedImages.length === 0) return alert("请先生成图片！");
            
            const status = document.getElementById("status");
            status.innerText = "正在合并图片...";

            try {
                // Load all images first
                const loadedImages = await Promise.all(
                    generatedImages.map(dataUrl => {
                        return new Promise((resolve, reject) => {
                            const img = new Image();
                            img.onload = () => resolve(img);
                            img.onerror = reject;
                            img.src = dataUrl;
                        });
                    })
                );

                // Calculate total dimensions
                const maxWidth = Math.max(...loadedImages.map(img => img.width));
                const totalHeight = loadedImages.reduce((sum, img) => sum + img.height, 0);

                // Create combined canvas
                const combinedCanvas = document.createElement('canvas');
                combinedCanvas.width = maxWidth;
                combinedCanvas.height = totalHeight;
                const ctx = combinedCanvas.getContext('2d');

                // Draw all images vertically
                let currentY = 0;
                for (const img of loadedImages) {
                    ctx.drawImage(img, 0, currentY);
                    currentY += img.height;
                }

                // Split combined image into 4 equal vertical parts
                const partCount = 4;
                const partHeight = Math.floor(totalHeight / partCount);
                const splitDataUrls = [];

                for (let i = 0; i < partCount; i++) {
                    const y = i * partHeight;
                    const h = i === partCount - 1 ? totalHeight - y : partHeight;

                    const partCanvas = document.createElement('canvas');
                    partCanvas.width = maxWidth;
                    partCanvas.height = h;
                    const partCtx = partCanvas.getContext('2d');
                    partCtx.drawImage(combinedCanvas, 0, y, maxWidth, h, 0, 0, maxWidth, h);

                    splitDataUrls.push(partCanvas.toDataURL("image/png", 1.0));
                }

                // Display the 4 parts and update download list
                const container = document.getElementById("genImg");
                container.innerHTML = "";
                generatedImages = splitDataUrls;
                imageDownloadNames = splitDataUrls.map((_, index) => `Combined_Part_${index + 1}`);

                splitDataUrls.forEach((dataUrl, index) => {
                    container.appendChild(createPageImage(dataUrl, `第 ${index + 1} 部分`));
                });

                status.innerText = "✨ 图片已合并并分割为 4 部分！点击「下载全部」保存。";
            } catch (err) {
                console.error(err);
                status.innerText = "❌ 合并失败: " + err.message;
            }
        }

        async function downloadAll() {
            if (generatedImages.length === 0) return alert("请先生成图片！");
            
            const status = document.getElementById("status");
            const total = generatedImages.length;

            // We use a loop with a delay to prevent the "Message Channel Closed" error
            for (let index = 0; index < total; index++) {
                status.innerText = `正在下载第 ${index + 1} / ${total} 页... 请勿关闭窗口`;

                const data = generatedImages[index];
                const a = document.createElement('a');
                a.href = data;
                a.download = `${imageDownloadNames[index]}.png`;
                
                // Add to DOM briefly (required for some Windows browsers)
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);

                // This 200ms pause prevents the browser from blocking the "Asynchronous Response"
                await new Promise(resolve => setTimeout(resolve, 200));
            }

            status.innerText = "✨ 所有图片已保存！";
        }
    </script>
</body>
</html>
