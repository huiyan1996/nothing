<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>A4 Generator - @安静而苒</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { display: flex; flex-direction: column; align-items: center; background: #f0f0f0; padding: 20px; font-family: sans-serif; }
        .textInp {
            width: 450px; padding: 25px; background: FloralWhite; min-height: 400px;
            outline: none; font-size: 16px; line-height: 1.8; word-wrap: break-word; 
            box-sizing: border-box; border: 1px solid #ccc;
        }
        .button {
            background: skyblue; border: 1px solid blue; padding: 10px 20px;
            border-radius: 10px; margin: 15px 0; cursor: pointer; font-weight: bold;
        }
        #genImg { margin-top: 20px; display: flex; flex-direction: column; gap: 15px; }
        .page-img { width: 450px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); border: 1px solid #ccc; display: block; }
        #status { color: #555; font-size: 14px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="textInp" class="textInp" contenteditable="true">
        在这里输入文字...
    </div>

    <div>
        <button class="button" onclick="startProcess()">生成图片并加水印</button>
        <button class="button" style="background: lightgreen;" onclick="downloadAll()">下载全部</button>
    </div>
    <div id="status">准备就绪</div>
    <div id="genImg"></div>

    <script>
        let generatedImages = [];

        async function startProcess() {
            const element = document.getElementById("textInp");
            const container = document.getElementById("genImg");
            const status = document.getElementById("status");

            container.innerHTML = "";
            generatedImages = [];
            
            const width = element.offsetWidth;
            const pageHeight = Math.floor(width * 1.414); 
            const totalHeight = element.scrollHeight + 50; // Increased buffer for last page
            const totalPages = Math.ceil(totalHeight / pageHeight);

            try {
                for (let i = 0; i < totalPages; i++) {
                    status.innerText = `[1/2] 正在截取第 ${i + 1} / ${totalPages} 页...`;

                    // STEP 1: Generate the clean slice
                    const canvas = await html2canvas(element, {
                        scale: 2, 
                        y: i * pageHeight,
                        height: Math.min(pageHeight, totalHeight - (i * pageHeight)),
                        windowHeight: totalHeight,
                        backgroundColor: "FloralWhite",
                        useCORS: true,
                        logging: false
                    });

                    // STEP 2: Add Watermark (Sequential approach)
                    status.innerText = `[2/2] 正在为第 ${i + 1} 页添加水印...`;
                    await applyWatermark(canvas);

                    // STEP 3: Save to array and display
                    const dataUrl = canvas.toDataURL("image/png");
                    generatedImages.push(dataUrl);

                    const img = document.createElement('img');
                    img.src = dataUrl;
                    img.className = "page-img";
                    container.appendChild(img);
                }
                status.innerText = "✨ 全部生成成功！";
            } catch (err) {
                console.error("Error:", err);
                status.innerText = "❌ 发生错误: " + err.message;
            }
        }

        // We make this an async function to ensure the browser paints the watermark
        async function applyWatermark(canvas) {
            return new Promise((resolve) => {
                const ctx = canvas.getContext('2d');
                const text = "@安静而苒";
                
                ctx.font = "bold 50px sans-serif";
                ctx.fillStyle = "rgba(0, 0, 0, 0.18)"; // Slightly lighter for better text contrast
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";

                const stepX = 350; 
                const stepY = 300;

                // Tiling loop
                for (let x = -stepX; x < canvas.width + stepX; x += stepX) {
                    for (let y = -stepY; y < canvas.height + stepY; y += stepY) {
                        ctx.save();
                        ctx.translate(x, y);
                        ctx.rotate(-35 * Math.PI / 180);
                        ctx.fillText(text, 0, 0);
                        ctx.restore();
                    }
                }
                
                // A tiny delay to let the GPU catch up
                setTimeout(resolve, 50);
            });
        }

        function downloadAll() {
            if (generatedImages.length === 0) return alert("请先生成图片");
            generatedImages.forEach((data, index) => {
                const a = document.createElement('a');
                a.href = data;
                a.download = `Page_${index + 1}.png`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            });
        }
    </script>
</body>
</html>
