<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>A4 Generator - @安静而苒</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { 
            display: flex; flex-direction: column; align-items: center; 
            background: #e9e9e9; padding: 20px; font-family: sans-serif; 
            margin: 0; height: 100vh; overflow: hidden;
        }

        /* Input Area */
        .textInp {
            width: 450px; height: 250px; padding: 20px; background: FloralWhite;
            outline: none; font-size: 16px; line-height: 1.8; word-wrap: break-word; 
            box-sizing: border-box; border: 1px solid #ccc; overflow-y: auto;
            margin-bottom: 10px;
        }

        .button {
            background: skyblue; border: 1px solid blue; padding: 10px 20px;
            border-radius: 10px; cursor: pointer; font-weight: bold;
        }

        /* NEW: Horizontal Scroll Container */
        #genImg { 
            margin-top: 20px; 
            display: flex; 
            flex-direction: row; /* Layout in a row */
            gap: 20px; 
            width: 95vw; 
            overflow-x: auto; /* Scroll horizontally */
            padding-bottom: 20px;
            border-top: 2px solid #ddd;
            padding-top: 20px;
        }

        .page-img { 
            height: 60vh; /* Scaled to fit screen height */
            width: auto; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.2); 
            border: 1px solid #aaa; 
            background: white;
        }

        #status { color: #333; font-size: 14px; margin: 10px 0; font-weight: bold;}
    </style>
</head>
<body>

    <div id="textInp" class="textInp" contenteditable="true">
        在此处粘贴或输入您的长文本...
    </div>

    <div>
        <button class="button" onclick="startProcess()">生成并盖水印</button>
        <button class="button" style="background: lightgreen;" onclick="downloadAll()">下载全部</button>
    </div>
    
    <div id="status">准备就绪</div>

    <div id="genImg"></div>

    <script>
        let generatedImages = [];

        async function startProcess() {
            const element = document.getElementById("textInp");
            const container = document.getElementById("genImg");
            const status = document.getElementById("status");

            container.innerHTML = "";
            generatedImages = [];
            
            const width = element.offsetWidth;
            const pageHeight = Math.floor(width * 1.414); 
            const totalHeight = element.scrollHeight + 20; 
            const totalPages = Math.ceil(totalHeight / pageHeight);

            try {
                for (let i = 0; i < totalPages; i++) {
                    status.innerText = `正在处理: 第 ${i + 1} / ${totalPages} 页...`;

                    // 1. Capture content
                    const rawCanvas = await html2canvas(element, {
                        scale: 2, 
                        y: i * pageHeight,
                        height: Math.min(pageHeight, totalHeight - (i * pageHeight)),
                        windowHeight: totalHeight,
                        backgroundColor: "FloralWhite",
                        useCORS: true
                    });

                    // 2. Create a "Flattening" Canvas to force the watermark on top
                    const finalCanvas = document.createElement('canvas');
                    finalCanvas.width = rawCanvas.width;
                    finalCanvas.height = rawCanvas.height;
                    const ctx = finalCanvas.getContext('2d');

                    // Draw the captured text first
                    ctx.drawImage(rawCanvas, 0, 0);

                    // Draw the watermark on top of the copy
                    drawWatermarkOnContext(ctx, finalCanvas.width, finalCanvas.height);

                    // 3. Convert to Image
                    const dataUrl = finalCanvas.toDataURL("image/png");
                    generatedImages.push(dataUrl);

                    const img = document.createElement('img');
                    img.src = dataUrl;
                    img.className = "page-img";
                    container.appendChild(img);
                }
                status.innerText = "✨ 生成成功！请向右滑动查看。";
            } catch (err) {
                status.innerText = "❌ 出错了: " + err.message;
            }
        }

        function drawWatermarkOnContext(ctx, w, h) {
            const text = "@安静而苒";
            ctx.font = "bold 55px sans-serif";
            ctx.fillStyle = "rgba(0, 0, 0, 0.18)"; 
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";

            const stepX = 350; 
            const stepY = 300;

            for (let x = -stepX; x < w + stepX; x += stepX) {
                for (let y = -stepY; y < h + stepY; y += stepY) {
                    ctx.save();
                    ctx.translate(x, y);
                    ctx.rotate(-35 * Math.PI / 180);
                    ctx.fillText(text, 0, 0);
                    ctx.restore();
                }
            }
        }

        function downloadAll() {
            if (generatedImages.length === 0) return alert("请先生成图片");
            generatedImages.forEach((data, index) => {
                const a = document.createElement('a');
                a.href = data;
                a.download = `Page_${index + 1}.png`;
                a.click();
            });
        }
    </script>
</body>
</html>
