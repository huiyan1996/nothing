<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>A4 Generator - @安静而苒</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { 
            display: flex; flex-direction: column; align-items: center; 
            background: #e9e9e9; padding: 20px; font-family: sans-serif; 
            margin: 0; min-height: 100vh;
        }

        /* Editor Area - No max-height so html2canvas sees everything */
        .textInp {
            width: 450px; 
            padding: 25px; 
            background: FloralWhite;
            outline: none; 
            font-size: 16px; 
            line-height: 1.8; 
            word-wrap: break-word; 
            box-sizing: border-box; 
            border: 1px solid #ccc;
            /* Height is determined by content */
        }

        .controls {
            position: sticky;
            top: 0;
            background: #f0f0f0;
            padding: 15px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 1000;
            border-bottom: 1px solid #ccc;
        }

        .button {
            background: skyblue; border: 1px solid blue; padding: 10px 20px;
            border-radius: 10px; cursor: pointer; font-weight: bold;
            margin: 5px;
        }

        /* Horizontal Scroll for Output */
        #genImg { 
            margin-top: 20px; 
            display: flex; 
            flex-direction: row; 
            gap: 20px; 
            width: 98vw; 
            overflow-x: auto; 
            padding: 20px 0;
        }

        .page-img { 
            height: 75vh; /* Large preview height */
            width: auto; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); 
            background: white;
            flex-shrink: 0; /* Prevents images from squishing */
        }

        #status { color: #333; font-size: 14px; margin: 5px 0; font-weight: bold;}
    </style>
</head>
<body>

    <div class="controls">
        <div>
            <button class="button" onclick="startProcess()">生成图片并加水印</button>
            <button class="button" style="background: lightgreen;" onclick="downloadAll()">下载全部</button>
        </div>
        <div id="status">准备就绪</div>
    </div>

    <div id="textInp" class="textInp" contenteditable="true">
        在此处输入文字... 编辑器高度会随文字增加，确保所有内容都能被抓取。
    </div>

    <div id="genImg"></div>

    <script>
        let generatedImages = [];

        async function startProcess() {
            const element = document.getElementById("textInp");
            const container = document.getElementById("genImg");
            const status = document.getElementById("status");

            container.innerHTML = "";
            generatedImages = [];
            
            const width = element.offsetWidth;
            const pageHeight = Math.floor(width * 1.414); 
            // Measure actual total height of the expanded editor
            const totalHeight = element.scrollHeight; 
            const totalPages = Math.ceil(totalHeight / pageHeight);

            try {
                for (let i = 0; i < totalPages; i++) {
                    status.innerText = `正在合成: 第 ${i + 1} / ${totalPages} 页...`;

                    // 1. Capture content slice
                    const rawCanvas = await html2canvas(element, {
                        scale: 2, 
                        y: i * pageHeight,
                        height: Math.min(pageHeight, totalHeight - (i * pageHeight)),
                        windowHeight: totalHeight,
                        backgroundColor: "FloralWhite",
                        useCORS: true,
                        logging: false
                    });

                    // 2. The "Flattening" Canvas - Manual Watermark Injection
                    const finalCanvas = document.createElement('canvas');
                    finalCanvas.width = rawCanvas.width;
                    finalCanvas.height = rawCanvas.height;
                    const ctx = finalCanvas.getContext('2d');

                    // Draw the captured content
                    ctx.drawImage(rawCanvas, 0, 0);

                    // Force the watermark on top of the pixels
                    drawWatermark(ctx, finalCanvas.width, finalCanvas.height);

                    // 3. Convert to high-quality PNG
                    const dataUrl = finalCanvas.toDataURL("image/png", 1.0);
                    generatedImages.push(dataUrl);

                    const img = document.createElement('img');
                    img.src = dataUrl;
                    img.className = "page-img";
                    container.appendChild(img);
                }
                status.innerText = "✨ 生成成功！右划查看图片。";
            } catch (err) {
                console.error(err);
                status.innerText = "❌ 出错了: " + err.message;
            }
        }

        function drawWatermark(ctx, w, h) {
            const text = "@安静而苒";
            ctx.font = "bold 60px sans-serif";
            ctx.fillStyle = "rgba(0, 0, 0, 0.2)"; 
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";

            const stepX = 400; 
            const stepY = 350;

            for (let x = -stepX; x < w + stepX; x += stepX) {
                for (let y = -stepY; y < h + stepY; y += stepY) {
                    ctx.save();
                    ctx.translate(x, y);
                    ctx.rotate(-35 * Math.PI / 180);
                    ctx.fillText(text, 0, 0);
                    ctx.restore();
                }
            }
        }

        function downloadAll() {
            if (generatedImages.length === 0) return alert("请先生成图片");
            generatedImages.forEach((data, index) => {
                const a = document.createElement('a');
                a.href = data;
                a.download = `Page_${index + 1}.png`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            });
        }
    </script>
</body>
</html>
